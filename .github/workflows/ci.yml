name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Typecheck • Test • Coverage • Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      APP_ENV: test
      SERVICE_NAME: zenno-api-ci
      APP_VERSION: ci
      # Providers determinísticos para os testes de Provider Layer
      ADS_PROVIDER: meta
      WHATSAPP_PROVIDER: uazapi
      PAYMENT_PROVIDER: stripe
      AI_PROVIDER: lovable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (bunx tsgo --noEmit)
        run: bunx tsgo --noEmit

      - name: Unit + Integration + Contract tests
        run: bun run test

      - name: Coverage
        run: bun run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Build (vite build)
        run: bun run build

      - name: Audit (security lint — advisory)
        continue-on-error: true
        run: bunx --bun audit-ci --moderate || true
